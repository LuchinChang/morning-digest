name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

# Allow one concurrent deployment; cancel any in-progress run on new push
concurrency:
  group: pages
  cancel-in-progress: true

# Permissions required by actions/deploy-pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ── Job 1: Validate ─────────────────────────────────────────
  validate:
    name: Validate digest files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate reading-log.json (delegated to normalize-log.py --check)
        # Single source of truth for schema validation. Hard-fails on:
        # invalid JSON, missing required fields, duplicate ids, and same URL
        # assigned to the same day twice. Cross-day URL repeats are warnings,
        # not errors, since they're legitimate for multi-day reads / promotions.
        run: |
          python3 normalize-log.py --check digests/reading-log.json

      - name: Inventory digest HTML files
        run: |
          python3 - <<'EOF'
          import json, os, re

          with open("digests/reading-log.json") as f:
              data = json.load(f)

          # Days that have at least one assigned article
          assigned_days = sorted({
              a["assignedDate"] for a in data["articles"]
              if a.get("assignedDate")
          })

          # HTML digests on disk
          html_files = sorted(
              f for f in os.listdir("digests")
              if re.match(r"morning-digest-\d{4}-\d{2}-\d{2}\.html$", f)
          )
          html_dates = {f[len("morning-digest-"):-len(".html")] for f in html_files}

          print(f"📅  Assigned days in JSON : {len(assigned_days)}")
          print(f"📄  HTML digests on disk  : {len(html_files)}")

          missing_html = [d for d in assigned_days if d not in html_dates]
          extra_html   = sorted(d for d in html_dates if d not in set(assigned_days))

          if missing_html:
              print(f"⚠️   Days in JSON without standalone HTML ({len(missing_html)}):")
              for d in missing_html:
                  print(f"      {d}")
          if extra_html:
              print(f"ℹ️   Standalone HTMLs not yet in JSON ({len(extra_html)}):")
              for d in extra_html:
                  print(f"      {d}")

          # These are informational only — neither blocks deployment.
          EOF

  # ── Job 2: Build + Deploy ────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: validate            # only deploy if validation passes
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'            # serve entire repo root

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
